<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — AID'Aux</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 360px;
        }
        h1 {
            color: #1c3885;
            font-size: 22px;
            margin-bottom: 8px;
        }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }
        label { font-size: 13px; color: #444; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 11px;
            background: #1c3885;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #00aaaa; }
        .error {
            background: #fdecea;
            color: #c0392b;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>AID'Aux Suivi</h1>
        <p>Connectez-vous pour accéder à l'application</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Identifiant</label>
            <input type="text" name="username" autofocus>
            <label>Mot de passe</label>
            <input type="password" name="password">
            <button type="submit">Se connecter</button>
        </form>
    </div>
</body>
</html>
